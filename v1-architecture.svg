<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <style>
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 12; ry: 12; }
    .title { font: 700 18px Arial, sans-serif; fill: #111827; }
    .text { font: 14px Arial, sans-serif; fill: #111827; }
    .sub { font: 12px Arial, sans-serif; fill: #374151; }
    .arrow { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .lane { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 2; rx: 16; ry: 16; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#1f2937" />
    </marker>
  </defs>

  <rect class="lane" x="40" y="40" width="1320" height="220" />
  <text class="title" x="60" y="75">Client &amp; Ingestion</text>

  <rect class="box" x="70" y="100" width="260" height="120" />
  <text class="text" x="90" y="135">User Upload</text>
  <text class="sub" x="90" y="160">PDF / PPTX / DOCX</text>
  <text class="sub" x="90" y="180">Report + Benchmark</text>

  <rect class="box" x="380" y="100" width="300" height="120" />
  <text class="text" x="400" y="135">API Gateway</text>
  <text class="sub" x="400" y="160">Auth + Rate Limit</text>
  <text class="sub" x="400" y="180">Creates Job</text>

  <rect class="box" x="740" y="100" width="280" height="120" />
  <text class="text" x="760" y="135">Object Storage</text>
  <text class="sub" x="760" y="160">Raw Files</text>
  <text class="sub" x="760" y="180">Extracted Assets</text>

  <rect class="box" x="1060" y="100" width="260" height="120" />
  <text class="text" x="1080" y="135">Job Queue</text>
  <text class="sub" x="1080" y="160">Async Processing</text>

  <path class="arrow" d="M330 160 L380 160" />
  <path class="arrow" d="M680 160 L740 160" />
  <path class="arrow" d="M1020 160 L1060 160" />

  <rect class="lane" x="40" y="300" width="1320" height="280" />
  <text class="title" x="60" y="335">Processing &amp; AI Review</text>

  <rect class="box" x="70" y="370" width="300" height="150" />
  <text class="text" x="90" y="405">Document Parser</text>
  <text class="sub" x="90" y="430">Text + Tables</text>
  <text class="sub" x="90" y="450">Page Numbers (visible)</text>

  <rect class="box" x="420" y="370" width="320" height="150" />
  <text class="text" x="440" y="405">OCR / Vision</text>
  <text class="sub" x="440" y="430">Charts + Graphics</text>
  <text class="sub" x="440" y="450">Labels + Values</text>

  <rect class="box" x="800" y="370" width="330" height="150" />
  <text class="text" x="820" y="405">Review Orchestrator</text>
  <text class="sub" x="820" y="430">Rules Engine</text>
  <text class="sub" x="820" y="450">Diff vs Benchmark</text>

  <rect class="box" x="1180" y="370" width="180" height="150" />
  <text class="text" x="1200" y="405">Gemini</text>
  <text class="sub" x="1200" y="430">Analysis Only</text>

  <path class="arrow" d="M370 445 L420 445" />
  <path class="arrow" d="M740 445 L800 445" />
  <path class="arrow" d="M1130 445 L1180 445" />

  <rect class="lane" x="40" y="620" width="1320" height="220" />
  <text class="title" x="60" y="655">Output &amp; Persistence</text>

  <rect class="box" x="70" y="690" width="320" height="120" />
  <text class="text" x="90" y="725">Findings Store</text>
  <text class="sub" x="90" y="750">Postgres</text>

  <rect class="box" x="440" y="690" width="360" height="120" />
  <text class="text" x="460" y="725">Sheets Writer</text>
  <text class="sub" x="460" y="750">Google Sheets API</text>

  <rect class="box" x="850" y="690" width="300" height="120" />
  <text class="text" x="870" y="725">Report Link</text>
  <text class="sub" x="870" y="750">Shared to User</text>

  <rect class="box" x="1200" y="690" width="160" height="120" />
  <text class="text" x="1218" y="725">Audit Logs</text>
  <text class="sub" x="1218" y="750">Access &amp; Output</text>

  <path class="arrow" d="M965 520 L965 690" />
  <path class="arrow" d="M390 750 L440 750" />
  <path class="arrow" d="M800 750 L850 750" />
  <path class="arrow" d="M1150 750 L1200 750" />
</svg>
